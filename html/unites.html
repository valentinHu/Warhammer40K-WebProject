<!DOCTYPE html>
<!-- Déclare que c'est une page HTML5 -->
<html lang="fr">
<head>
  <!-- Permet d'afficher les accents et caractères spéciaux -->
  <meta charset="UTF-8" />
  <!-- Adapte la page aux écrans mobiles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warhammer 40K - Unités</title>
  <!-- ../ remonte d'un dossier car on est dans html/ -->
  <link rel="stylesheet" href="../css/style.css" />
</head>

<!-- Thème sombre par défaut, changé par le JavaScript -->
<body class="theme-dark">

  <!-- En-tête identique sur toutes les pages -->
  <header>
    <h1>Warhammer 40K</h1>
    <p>In the grim darkness of the far future, there is only war.</p>
  </header>

  <!-- Sélecteurs de style et de langue -->
  <div class="controls">
    <label for="select-theme" data-lang="style_label">Style :</label>
    <select id="select-theme" onchange="changerTheme()">
	<option value="dark" data-lang="style_dark">Sombre</option>
	<option value="light" data-lang="style_light">Clair</option>
	<option value="red" data-lang="style_red">Guerre</option>
    </select>

    <label for="select-lang" data-lang="lang_label">Langue :</label>
    <select id="select-lang" onchange="changerLangue()">
      <option value="fr">Français</option>
      <option value="en">English</option>
      <option value="nl">Nederlands</option>
    </select>
  </div>

  <!-- Navigation, ../ pour remonter vers la racine -->
  <nav>
    <ul>
      <li><a href="../index.html" data-lang="nav_factions">Factions</a></li>
      <li><a href="unites.html"   data-lang="nav_units">Unités</a></li>
      <li><a href="details.html"  data-lang="nav_details">Détails</a></li>
    </ul>
  </nav>

  <main>
    <!-- Le titre est mis à jour par unites.js avec le nom de la faction choisie -->
    <h2 id="titre-faction">Unités</h2>

    <!-- Bouton retour vers la page des factions -->
    <a href="../index.html" class="btn" style="margin-bottom: 25px; display: inline-block;" data-lang="back_factions">
      ← Retour aux factions
    </a>

    <h3 style="margin: 20px 0 15px;" data-lang="choose_unit">Choisissez une unité :</h3>

    <!-- Les cartes d'unités sont générées ici par unites.js -->
    <div class="grid" id="liste-unites">
      <p>Chargement...</p>
    </div>
  </main>

  <!-- Scripts en bas pour que le HTML soit prêt avant le JS -->
  <script src="../script/main.js"></script>
  <script src="../script/unites.js"></script>

</body>
</html>
