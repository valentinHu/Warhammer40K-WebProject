<!DOCTYPE html>
<!-- Déclare que c'est une page HTML5 -->
<html lang="fr">
<head>
  <!-- Permet d'afficher les accents et caractères spéciaux -->
  <meta charset="UTF-8" />
  <!-- Adapte la page aux écrans mobiles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warhammer 40K</title>
  <!-- Lien vers notre fichier CSS pour le style -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<!-- Thème sombre par défaut, changé par le JavaScript -->
<body class="theme-dark">

  <!-- En-tête du site, identique sur toutes les pages -->
  <header>
    <h1>Warhammer 40K</h1>
    <p>In the grim darkness of the far future, there is only war.</p>
  </header>

  <!-- Sélecteurs de style et de langue -->
  <div class="controls">
    <label for="select-theme" data-lang="style_label">Style :</label>
    <!-- Appelle changerTheme() quand on change le style -->
    <select id="select-theme" onchange="changerTheme()">
	<option value="dark" data-lang="style_dark">Sombre</option>
	<option value="light" data-lang="style_light">Clair</option>
	<option value="red" data-lang="style_red">Guerre</option>
    </select>

    <label for="select-lang" data-lang="lang_label">Langue :</label>
    <!-- Appelle changerLangue() quand on change la langue -->
    <select id="select-lang" onchange="changerLangue()">
      <option value="fr">Français</option>
      <option value="en">English</option>
      <option value="nl">Nederlands</option>
    </select>
  </div>

  <!-- Navigation vers les 3 pages, textes traduits via data-lang -->
  <nav>
    <ul>
      <li><a href="index.html"        data-lang="nav_factions">Factions</a></li>
      <li><a href="html/unites.html"  data-lang="nav_units">Unités</a></li>
      <li><a href="html/details.html" data-lang="nav_details">Détails</a></li>
    </ul>
  </nav>

  <!-- Contenu principal de la page -->
  <main>
    <h2 data-lang="welcome_title">Bienvenue dans l'Univers Warhammer 40K</h2>
    <p class="intro-text" data-lang="welcome_text">
      Dans le sombre futur du 41ème millénaire, il n'y a que la guerre.
    </p>
    <h3 style="margin-bottom: 20px;" data-lang="choose_faction">Choisissez une faction :</h3>

    <!-- Les cartes de factions sont générées ici par index.js -->
    <div class="grid" id="liste-factions">
      <p>Chargement...</p>
    </div>
  </main>

  <!-- Scripts chargés en bas pour que le HTML soit prêt avant le JS -->
  <script src="script/main.js"></script>
  <script src="script/index.js"></script>

</body>
</html>
