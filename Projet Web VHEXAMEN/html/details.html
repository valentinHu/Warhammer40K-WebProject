<!DOCTYPE html>
<!-- Déclare que c'est une page HTML5 -->
<html lang="fr">
<head>
  <!-- Permet d'afficher les accents et caractères spéciaux -->
  <meta charset="UTF-8" />
  <!-- Adapte la page aux écrans mobiles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warhammer 40K - Détails</title>
  <!-- ../ remonte d'un dossier car on est dans html/ -->
  <link rel="stylesheet" href="../css/style.css" />
</head>

<!-- Thème sombre par défaut, changé par le JavaScript -->
<body class="theme-dark">

  <!-- En-tête identique sur toutes les pages -->
  <header>
    <h1>Warhammer 40K</h1>
    <p>In the grim darkness of the far future, there is only war.</p>
  </header>

  <!-- Sélecteurs de style et de langue -->
  <div class="controls">
    <label for="select-theme" data-lang="style_label">Style :</label>
    <select id="select-theme" onchange="changerTheme()">
	<option value="dark" data-lang="style_dark">Sombre</option>
	<option value="light" data-lang="style_light">Clair</option>
	<option value="red" data-lang="style_red">Guerre</option>
    </select>

    <label for="select-lang" data-lang="lang_label">Langue :</label>
    <select id="select-lang" onchange="changerLangue()">
      <option value="fr">Français</option>
      <option value="en">English</option>
      <option value="nl">Nederlands</option>
    </select>
  </div>

  <!-- Navigation, ../ pour remonter vers la racine -->
  <nav>
    <ul>
      <li><a href="../index.html" data-lang="nav_factions">Factions</a></li>
      <li><a href="unites.html"   data-lang="nav_units">Unités</a></li>
      <li><a href="details.html"  data-lang="nav_details">Détails</a></li>
    </ul>
  </nav>

  <main>
    <!-- Boutons de retour vers les pages précédentes -->
    <div style="margin-bottom: 20px;">
      <a href="../index.html" class="btn" style="margin-right: 10px;" data-lang="back_factions">← Factions</a>
      <!-- Le href de ce lien est mis à jour par details.js pour inclure la bonne faction -->
      <a id="lien-retour-unites" href="unites.html" class="btn" data-lang="back_units">← Unités</a>
    </div>

    <h2 data-lang="unit_details">Détails de l'unité</h2>

    <!-- Rempli par details.js avec l'image, le nom et la description -->
    <div id="detail-unite">
      <p>Chargement...</p>
    </div>

    <!-- Caché par défaut, affiché par details.js quand les ventes sont disponibles -->
    <div id="zone-tableau" style="display:none;">
      <h3 style="margin: 25px 0 10px;" data-lang="sales_title">Ventes des 10 dernières années</h3>
      <table>
        <thead>
          <tr>
            <th data-lang="year">Année</th>
            <th data-lang="units_sold">Unités vendues</th>
          </tr>
        </thead>
        <!-- Les lignes du tableau sont générées par details.js -->
        <tbody id="tableau-ventes"></tbody>
      </table>
    </div>
  </main>

  <!-- Scripts en bas pour que le HTML soit prêt avant le JS -->
  <script src="../script/main.js"></script>
  <script src="../script/details.js"></script>

</body>
</html>
